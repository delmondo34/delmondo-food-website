name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Repo checkout
        uses: actions/checkout@v4

      - name: Node.js kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Bağımlılıkları yükle
        run: npm ci

      - name: GitHub Pages ortam değişkenleri
        run: |
          echo "GITHUB_PAGES=true" >> $GITHUB_ENV

      - name: Tina env kontrol
        env:
          NEXT_PUBLIC_TINA_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_TINA_CLIENT_ID }}
          TINA_TOKEN: ${{ secrets.TINA_TOKEN }}
          NEXT_PUBLIC_TINA_BRANCH: ${{ github.ref_name }}
        run: |
          echo "GITHUB_REF_NAME=$GITHUB_REF_NAME"
          echo "NEXT_PUBLIC_TINA_BRANCH=$NEXT_PUBLIC_TINA_BRANCH"
          node -e "console.log('HAS_CLIENT_ID=', !!process.env.NEXT_PUBLIC_TINA_CLIENT_ID, 'LEN=', (process.env.NEXT_PUBLIC_TINA_CLIENT_ID||'').length)"
          node -e "console.log('HAS_TINA_TOKEN=', !!process.env.TINA_TOKEN, 'LEN=', (process.env.TINA_TOKEN||'').length)"

      - name: Statik build al
        env:
          NEXT_PUBLIC_TINA_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_TINA_CLIENT_ID }}
          TINA_TOKEN: ${{ secrets.TINA_TOKEN }}
          NEXT_PUBLIC_TINA_BRANCH: ${{ github.ref_name }}
        run: npm run tina:build

      - name: Pages yapılandır
        uses: actions/configure-pages@v5

      - name: Artifact yükle
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: GitHub Pages'e deploy et
        id: deployment
        uses: actions/deploy-pages@v4
